<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - EV Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }
        .input-field {
            transition: all 0.3s;
            border: 2px solid #e5e7eb;
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            background: #f9fafb;
        }
        .input-field:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
            outline: none;
            background: white;
        }
        .btn-primary {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            width: 100%;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: white;
            color: #374151;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            border: 2px solid #e5e7eb;
            transition: all 0.3s;
            cursor: pointer;
            width: 100%;
        }
        .btn-secondary:hover {
            border-color: #10b981;
            background: #f9fafb;
        }
        .otp-container {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin: 2rem 0;
        }
        .otp-input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid #e5e7eb;
            border-radius: 0.75rem;
            transition: all 0.3s;
        }
        .otp-input:focus {
            border-color: #10b981;
            outline: none;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        .timer {
            font-size: 0.875rem;
            color: #6b7280;
        }
        .resend-btn {
            color: #10b981;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
            background: none;
            border: none;
        }
        .resend-btn:disabled {
            color: #9ca3af;
            cursor: not-allowed;
            text-decoration: none;
        }
        .toast-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 1rem;
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #10b981;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        .toast-notification.error {
            border-left-color: #ef4444;
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #10b981;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
        }
        .step {
            flex: 1;
            text-align: center;
        }
        .step-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: white;
            border: 2px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.5rem;
            font-weight: 600;
        }
        .step.active .step-circle {
            background: #10b981;
            color: white;
            border-color: #10b981;
        }
        .step.completed .step-circle {
            background: #10b981;
            color: white;
            border-color: #10b981;
        }
        .step-label {
            font-size: 0.75rem;
            color: #6b7280;
        }
        .step.active .step-label {
            color: #10b981;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="w-full max-w-md">
        <!-- Back to login -->
        <a href="login.html" class="inline-flex items-center text-white bg-green-600 bg-opacity-50 hover:bg-opacity-70 px-4 py-2 rounded-lg mb-4 transition backdrop-blur-sm">
            <i class="fas fa-arrow-left mr-2"></i>
            Back to Login
        </a>

        <div class="glass-card">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-gradient-to-r from-green-600 to-emerald-600 rounded-2xl mx-auto mb-3 flex items-center justify-center">
                    <span class="text-white text-3xl">⚡</span>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">Reset Password</h1>
                <p class="text-gray-600 text-sm mt-1">We'll send an OTP to reset your password</p>
            </div>

            <!-- Step Indicator -->
            <div class="step-indicator mb-6">
                <div class="step active" id="step1Indicator">
                    <div class="step-circle">1</div>
                    <div class="step-label">Email</div>
                </div>
                <div class="step" id="step2Indicator">
                    <div class="step-circle">2</div>
                    <div class="step-label">Verify OTP</div>
                </div>
                <div class="step" id="step3Indicator">
                    <div class="step-circle">3</div>
                    <div class="step-label">New Password</div>
                </div>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="bg-red-50 text-red-600 p-3 rounded-lg mb-4 hidden flex items-center text-sm">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span id="errorText"></span>
            </div>

            <!-- Success Message -->
            <div id="successMessage" class="bg-green-50 text-green-600 p-3 rounded-lg mb-4 hidden flex items-center text-sm">
                <i class="fas fa-check-circle mr-2"></i>
                <span id="successText"></span>
            </div>

            <!-- Step 1: Email Input -->
            <div id="step1">
                <form id="forgotForm" class="space-y-4">
                    <div>
                        <label class="block text-gray-700 font-semibold text-sm mb-1">Email Address</label>
                        <input type="email" id="email" required class="input-field" placeholder="john@example.com">
                    </div>
                    <button type="submit" id="sendOtpBtn" class="btn-primary">
                        <span>Send OTP</span>
                    </button>
                </form>
            </div>

            <!-- Step 2: OTP Verification -->
            <div id="step2" class="hidden">
                <div class="text-center mb-4">
                    <p class="text-sm text-gray-600">We've sent a verification code to</p>
                    <p class="font-semibold text-green-600" id="otpEmailDisplay"></p>
                </div>
                
                <div class="otp-container">
                    <input type="text" class="otp-input" id="otp1" maxlength="1" onkeyup="moveToNext(this, 'otp2')" onkeypress="return onlyNumberKey(event)">
                    <input type="text" class="otp-input" id="otp2" maxlength="1" onkeyup="moveToNext(this, 'otp3')" onkeypress="return onlyNumberKey(event)">
                    <input type="text" class="otp-input" id="otp3" maxlength="1" onkeyup="moveToNext(this, 'otp4')" onkeypress="return onlyNumberKey(event)">
                    <input type="text" class="otp-input" id="otp4" maxlength="1" onkeyup="moveToNext(this, 'otp5')" onkeypress="return onlyNumberKey(event)">
                    <input type="text" class="otp-input" id="otp5" maxlength="1" onkeyup="moveToNext(this, 'otp6')" onkeypress="return onlyNumberKey(event)">
                    <input type="text" class="otp-input" id="otp6" maxlength="1" onkeypress="return onlyNumberKey(event)">
                </div>

                <div class="text-center mb-4">
                    <span class="timer" id="timer">10:00</span>
                </div>

                <div class="text-center mb-4">
                    <button class="resend-btn" id="resendBtn" onclick="resendOTP()" disabled>Resend OTP</button>
                </div>

                <button onclick="verifyOTP()" id="verifyBtn" class="btn-primary mb-3">
                    Verify OTP
                </button>

                <button onclick="backToStep1()" class="text-sm text-gray-600 hover:text-green-600 w-full">
                    ← Back
                </button>
            </div>

            <!-- Step 3: New Password -->
            <div id="step3" class="hidden">
                <form id="resetForm" class="space-y-4">
                    <div>
                        <label class="block text-gray-700 font-semibold text-sm mb-1">New Password</label>
                        <input type="password" id="newPassword" required class="input-field" placeholder="••••••••">
                        <p class="text-xs text-gray-500 mt-1">Minimum 6 characters</p>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold text-sm mb-1">Confirm Password</label>
                        <input type="password" id="confirmPassword" required class="input-field" placeholder="••••••••">
                    </div>
                    <button type="submit" id="resetBtn" class="btn-primary">
                        Reset Password
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000/api';
        let resetToken = '';
        let userEmail = '';
        let timerInterval;
        let timeLeft = 600; // 10 minutes in seconds

        // Only allow numbers in OTP inputs
        window.onlyNumberKey = function(evt) {
            const charCode = evt.which ? evt.which : evt.keyCode;
            if (charCode > 31 && (charCode < 48 || charCode > 57)) {
                return false;
            }
            return true;
        };

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast-notification ${type === 'error' ? 'error' : ''}`;
            toast.innerHTML = `
                <div class="flex items-center gap-3">
                    <i class="fas ${type === 'success' ? 'fa-check-circle text-green-500' : 'fa-exclamation-circle text-red-500'} text-xl"></i>
                    <p class="text-gray-800">${message}</p>
                </div>
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function showMessage(element, message, isSuccess = true) {
            const msgDiv = document.getElementById(element);
            const textSpan = document.getElementById(element === 'errorMessage' ? 'errorText' : 'successText');
            if (msgDiv && textSpan) {
                textSpan.textContent = message;
                msgDiv.classList.remove('hidden');
                if (isSuccess) {
                    setTimeout(() => msgDiv.classList.add('hidden'), 3000);
                }
            }
        }

        window.moveToNext = function(current, nextId) {
            if (current.value.length === 1) {
                const next = document.getElementById(nextId);
                if (next) {
                    next.focus();
                }
            }
        };

        function startTimer(seconds) {
            timeLeft = seconds;
            updateTimerDisplay();
            
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('timer').textContent = 'OTP expired';
                    document.getElementById('resendBtn').disabled = false;
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        window.backToStep1 = function() {
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step1').classList.remove('hidden');
            clearInterval(timerInterval);
            
            document.getElementById('step1Indicator').classList.add('active');
            document.getElementById('step2Indicator').classList.remove('active');
        };

        // Step 1: Send OTP
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const submitBtn = document.getElementById('sendOtpBtn');
            
            if (!email) {
                showMessage('errorMessage', 'Please enter your email', false);
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="loading-spinner"></div><span>Sending...</span>';

            try {
                const response = await fetch(`${API_BASE_URL}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    userEmail = email;
                    
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                    document.getElementById('otpEmailDisplay').textContent = email;
                    
                    document.getElementById('step1Indicator').classList.remove('active');
                    document.getElementById('step1Indicator').classList.add('completed');
                    document.getElementById('step2Indicator').classList.add('active');
                    
                    startTimer(600);
                    showMessage('successMessage', 'OTP sent successfully!');
                    
                    // Clear OTP inputs
                    for (let i = 1; i <= 6; i++) {
                        document.getElementById(`otp${i}`).value = '';
                    }
                    document.getElementById('otp1').focus();
                } else {
                    showMessage('errorMessage', data.message || 'Email not found', false);
                }
            } catch (error) {
                showMessage('errorMessage', 'Connection error. Please try again.', false);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Send OTP</span>';
            }
        });

        // Step 2: Verify OTP
        window.verifyOTP = async function() {
            const otp = [
                document.getElementById('otp1').value,
                document.getElementById('otp2').value,
                document.getElementById('otp3').value,
                document.getElementById('otp4').value,
                document.getElementById('otp5').value,
                document.getElementById('otp6').value
            ].join('');

            if (otp.length !== 6) {
                showMessage('errorMessage', 'Please enter complete OTP', false);
                return;
            }

            const verifyBtn = document.getElementById('verifyBtn');
            verifyBtn.disabled = true;
            verifyBtn.innerHTML = '<div class="loading-spinner"></div><span>Verifying...</span>';

            try {
                const response = await fetch(`${API_BASE_URL}/auth/verify-reset-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, otp })
                });

                const data = await response.json();

                if (response.ok) {
                    resetToken = data.resetToken;
                    
                    document.getElementById('step2').classList.add('hidden');
                    document.getElementById('step3').classList.remove('hidden');
                    
                    document.getElementById('step2Indicator').classList.remove('active');
                    document.getElementById('step2Indicator').classList.add('completed');
                    document.getElementById('step3Indicator').classList.add('active');
                    
                    clearInterval(timerInterval);
                } else {
                    showMessage('errorMessage', data.message || 'Invalid OTP', false);
                }
            } catch (error) {
                showMessage('errorMessage', 'Verification failed', false);
            } finally {
                verifyBtn.disabled = false;
                verifyBtn.innerHTML = 'Verify OTP';
            }
        };

        // Resend OTP
        window.resendOTP = async function() {
            if (timeLeft > 0 && timeLeft < 600) {
                showMessage('errorMessage', 'Please wait for OTP to expire', false);
                return;
            }

            const resendBtn = document.getElementById('resendBtn');
            resendBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                });

                if (response.ok) {
                    showMessage('successMessage', 'New OTP sent!');
                    startTimer(600);
                    
                    // Clear OTP inputs
                    for (let i = 1; i <= 6; i++) {
                        document.getElementById(`otp${i}`).value = '';
                    }
                    document.getElementById('otp1').focus();
                }
            } catch (error) {
                showMessage('errorMessage', 'Failed to resend OTP', false);
            } finally {
                resendBtn.disabled = false;
            }
        };

        // Step 3: Reset Password
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const resetBtn = document.getElementById('resetBtn');

            if (newPassword.length < 6) {
                showMessage('errorMessage', 'Password must be at least 6 characters', false);
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage('errorMessage', 'Passwords do not match', false);
                return;
            }

            resetBtn.disabled = true;
            resetBtn.innerHTML = '<div class="loading-spinner"></div><span>Resetting...</span>';

            try {
                const response = await fetch(`${API_BASE_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ resetToken, newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('successMessage', 'Password reset successful! Redirecting to login...');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showMessage('errorMessage', data.message || 'Failed to reset password', false);
                }
            } catch (error) {
                showMessage('errorMessage', 'Connection error', false);
            } finally {
                resetBtn.disabled = false;
                resetBtn.innerHTML = 'Reset Password';
            }
        });

        // Clear OTP inputs on page load
        document.addEventListener('DOMContentLoaded', () => {
            for (let i = 1; i <= 6; i++) {
                const otpInput = document.getElementById(`otp${i}`);
                if (otpInput) otpInput.value = '';
            }
        });
    </script>
</body>
</html>
