services:
  - type: web
    name: ev-finder-backend
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://RAKESHM2004.github.io/ev-finder
